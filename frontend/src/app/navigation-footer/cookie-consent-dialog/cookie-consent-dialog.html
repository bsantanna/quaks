@if (!cookieConsent().consentGiven) {
    <div class="pointer-events-none fixed inset-x-0 bottom-0 px-6 pb-6">
        <div class="cookie-dialog pointer-events-auto mx-auto max-w-xl p-6">

            <p class="cookie-text text-sm/6">
                We use strictly necessary cookies to ensure the basic functionality of our site.
                Currently, no non-essential cookies are used.
                <br/>See our
                <a href="/privacy" class="cookie-link font-semibold">
                    cookie policy
                </a> for full details on what we store and your rights under GDPR.
            </p>

            <div class="mt-4 flex items-center gap-x-5 w-full justify-end">
                <button type="button"
                        (click)="updateConsent('all')"
                        class="cookie-btn-accept px-3 py-2 text-sm font-semibold">
                    Accept all
                </button>
                <button type="button"
                        (click)="updateConsent('essential_only')"
                        class="cookie-btn-reject text-sm/6 font-semibold">
                    Reject non-essential
                </button>
            </div>

        </div>
    </div>
}
