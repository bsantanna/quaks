<div class="relative w-full">
  <!-- Search Input -->
  <div class="relative flex items-center">
    <!-- Search Icon -->
    <img src="/svg/icon-search.svg" class="pointer-events-none absolute left-3 size-5" aria-hidden="true" alt="" />

    <!-- Input Field -->
    <input
      type="text"
      [value]="searchQuery()"
      (input)="onSearch($event)"
      (focus)="onInputFocus()"
      (blur)="onInputBlur()"
      (keydown)="onKeyDown($event)"
      [placeholder]="inputPlaceholder()"
      class="autocomplete-input block w-full py-1.5 pr-10 pl-10 text-base sm:text-sm/6 transition-all duration-150"
    />

    <!-- Clear Button -->
    @if (searchQuery().length > 0) {
      <button
        (click)="onClearSearch()"
        class="absolute right-3 inline-flex items-center justify-center rounded-full p-0.5 text-white/50 hover:text-white hover:bg-slate-600/50 transition-all duration-150 cursor-pointer"
        aria-label="Clear search"
      >
        <img src="/svg/icon-close.svg" class="size-4" aria-hidden="true" alt="" />
      </button>
    }
  </div>

  <!-- Dropdown Menu -->
  @if (isOpen() && filteredStocks().length > 0) {
    <div
      #dropdown
      class="autocomplete-dropdown absolute top-full left-0 right-0 mt-1 max-h-64 overflow-y-auto z-50"
    >
      @for (stock of filteredStocks(); track stock.key_ticker; let i = $index) {
        <button
          (click)="onSelectStock(stock)"
          [class]="'autocomplete-item block w-full px-4 py-2.5 text-left text-sm focus:outline-none transition-colors duration-100 cursor-pointer ' + (highlightedIndex() === i ? 'highlighted' : '')"
        >
          <div class="flex items-center justify-between">
            <div class="flex flex-col">
              <span class="autocomplete-item-title font-semibold">{{ stock.key_ticker }}</span>
              <span class="autocomplete-item-subtitle text-xs">{{ stock.name }}</span>
            </div>
          </div>
        </button>
      }
    </div>
  }

  <!-- No Results Message -->
  @if (isOpen() && searchQuery().length > 0 && filteredStocks().length === 0) {
    <div
      class="autocomplete-dropdown absolute top-full left-0 right-0 mt-1 px-4 py-3 text-center text-sm"
    >
      No stocks found for "{{ searchQuery() }}"
    </div>
  }
</div>
