<div class="relative w-full">
  <!-- Search Input -->
  <div class="relative flex items-center">
    <!-- Search Icon -->
    <img src="/svg/icon-search.svg" class="pointer-events-none absolute left-3 size-5" aria-hidden="true" alt="" />

    <!-- Input Field -->
    <input
      type="text"
      [value]="searchQuery()"
      (input)="onSearch($event)"
      (focus)="onInputFocus()"
      (blur)="onInputBlur()"
      (keydown.enter)="onSearchSubmit()"
      [placeholder]="inputPlaceholder()"
      class="autocomplete-input block w-full py-1.5 pr-10 pl-10 text-base sm:text-sm/6 transition-all duration-150"
    />

    <!-- Clear Button -->
    @if (searchQuery().length > 0) {
      <button
        (click)="onClearSearch()"
        class="absolute right-3 inline-flex items-center justify-center rounded-full p-0.5 text-white/50 hover:text-white hover:bg-slate-600/50 transition-all duration-150 cursor-pointer"
        aria-label="Clear search"
      >
        <img src="/svg/icon-close.svg" class="size-4" aria-hidden="true" alt="" />
      </button>
    }
  </div>

  <!-- Dropdown Menu -->
  @if (isOpen() && searchQuery().trim().length > 0) {
    <div
      class="autocomplete-dropdown absolute top-full left-0 right-0 mt-1 z-50"
    >
      <button
        (click)="onSearchSubmit()"
        class="autocomplete-item block w-full px-4 py-2.5 text-left text-sm focus:outline-none transition-colors duration-100 cursor-pointer"
      >
        <span class="autocomplete-item-subtitle">Search for </span>
        <span class="autocomplete-item-title font-semibold">"{{ searchQuery().trim() }}"</span>
      </button>
    </div>
  }
</div>
