<div class="relative">
    <button type="button" (click)="toggleMenu()"
            class="insights-trigger">
        <span>Insights</span>
        <img src="/svg/icon-chevron-down.svg"
             class="insights-chevron size-4"
             [class.open]="showMenu()"
             aria-hidden="true" alt="" />
    </button>

    @if (showMenu()) {
        <div class="insights-panel">
            <button class="insights-item" (click)="navigate('/insights/agents')">
                <img src="/svg/icon-agents-profile.svg" class="size-5" aria-hidden="true" alt="" />
                <span>Insights Agents</span>
            </button>
            <button class="insights-item" (click)="navigate('/insights/stocks')">
                <img src="/svg/icon-bar-chart-square.svg" class="size-5" aria-hidden="true" alt="" />
                <span>Stocks Insights</span>
            </button>
        </div>
    }
</div>
