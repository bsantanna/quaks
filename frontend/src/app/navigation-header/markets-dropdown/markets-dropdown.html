<div class="relative">
    <button type="button" (click)="toggleMenu()"
            class="markets-trigger">
        <span>Markets</span>
        <img src="/svg/icon-chevron-down.svg"
             class="markets-chevron size-4"
             [class.open]="showMenu()"
             aria-hidden="true" alt="" />
    </button>

    @if (showMenu()) {
        <div class="markets-panel">
            <button class="markets-item" (click)="navigate('/markets/stocks')">
                <img src="/svg/icon-bar-chart.svg" class="size-5" aria-hidden="true" alt="" />
                <span>Stocks</span>
            </button>
            <button class="markets-item" (click)="navigate('/markets/performance')">
                <img src="/svg/icon-chart-compare.svg" class="size-5" aria-hidden="true" alt="" />
                <span>Performance</span>
            </button>
            <button class="markets-item" (click)="navigate('/markets/news')">
                <img src="/svg/icon-document.svg" class="size-5" aria-hidden="true" alt="" />
                <span>News</span>
            </button>
        </div>
    }
</div>
