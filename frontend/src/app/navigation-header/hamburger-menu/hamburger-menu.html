<button type="button" (click)="toggle()"
        class="hamburger-btn"
        aria-label="Open menu">
    @if (menuOpen()) {
        <img src="/svg/icon-close.svg" class="size-5" aria-hidden="true" alt="" />
    } @else {
        <img src="/svg/icon-hamburger.svg" class="size-5" aria-hidden="true" alt="" />
    }
</button>

@if (menuOpen()) {
    <div class="hamburger-backdrop" (click)="close()"></div>
    <div class="hamburger-panel">
        <div class="hamburger-layout">

            <div class="hamburger-left">
                <div class="hamburger-section">
                    <span class="hamburger-label">Markets</span>
                    <button class="hamburger-item" (click)="navigate('/markets/stocks')">
                        <img src="/svg/icon-bar-chart.svg" class="size-5" aria-hidden="true" alt="" />
                        <span>Stocks</span>
                    </button>
                    <button class="hamburger-item" (click)="navigate('/markets/performance')">
                        <img src="/svg/icon-chart-compare.svg" class="size-5" aria-hidden="true" alt="" />
                        <span>Performance</span>
                    </button>
                    <button class="hamburger-item" (click)="navigate('/markets/news')">
                        <img src="/svg/icon-document.svg" class="size-5" aria-hidden="true" alt="" />
                        <span>News</span>
                    </button>
                </div>

                <div class="hamburger-section">
                    <span class="hamburger-label">Insights</span>
                    <button class="hamburger-item" (click)="navigate('/insights/news')">
                        <img src="/svg/icon-document.svg" class="size-5" aria-hidden="true" alt="" />
                        <span>News Insights</span>
                    </button>
                    <button class="hamburger-item" (click)="navigate('/insights/stocks')">
                        <img src="/svg/icon-bar-chart-square.svg" class="size-5" aria-hidden="true" alt="" />
                        <span>Financial Insights</span>
                    </button>
                    <button class="hamburger-item" (click)="navigate('/insights/agents')">
                        <img src="/svg/icon-agents-profile.svg" class="size-5" aria-hidden="true" alt="" />
                        <span>Our Agents</span>
                    </button>
                </div>

                @if (path().indexOf('stocks') > -1) {
                    <div class="hamburger-section">
                        <span class="hamburger-label">Search Stocks</span>
                        <app-stock-autocomplete
                                [inputPlaceholder]="'Search stock symbols'"
                                (stockSelected)="onKeyTickerSelected($event)">
                        </app-stock-autocomplete>
                    </div>
                }

                @if (path().indexOf('news') > -1) {
                    <div class="hamburger-section">
                        <span class="hamburger-label">Search News</span>
                        <app-news-autocomplete
                                [inputPlaceholder]="'Search news'">
                        </app-news-autocomplete>
                    </div>
                }
            </div>

            <div class="hamburger-right">
                <div class="hamburger-section">
                    <span class="hamburger-label">Theme</span>
                    <div class="hamburger-theme-dropdown">
                        <button class="hamburger-theme-trigger" (click)="toggleThemeDropdown()">
                            <span class="hamburger-swatch hamburger-swatch-{{themeService.state().theme}}"></span>
                            <span class="hamburger-theme-trigger-label">{{themeService.state().theme | titlecase}}</span>
                            <img src="/svg/icon-chevron-down.svg" class="hamburger-theme-chevron size-4" [class.open]="themeOpen()" aria-hidden="true" alt="" />
                        </button>
                        @if (themeOpen()) {
                            <div class="hamburger-theme-list">
                                <button (click)="selectTheme('default')" class="hamburger-theme-item">
                                    <span class="hamburger-swatch hamburger-swatch-default"></span>
                                    <span>Default</span>
                                </button>
                                <button (click)="selectTheme('bloomnerd')" class="hamburger-theme-item">
                                    <span class="hamburger-swatch hamburger-swatch-bloomnerd"></span>
                                    <span>Bloomnerd</span>
                                </button>
                                <button (click)="selectTheme('matrix')" class="hamburger-theme-item">
                                    <span class="hamburger-swatch hamburger-swatch-matrix"></span>
                                    <span>Matrix</span>
                                </button>
                                <button (click)="selectTheme('batman')" class="hamburger-theme-item">
                                    <span class="hamburger-swatch hamburger-swatch-batman"></span>
                                    <span>Batman</span>
                                </button>
                                <button (click)="selectTheme('barbie')" class="hamburger-theme-item">
                                    <span class="hamburger-swatch hamburger-swatch-barbie"></span>
                                    <span>Barbie</span>
                                </button>
                            </div>
                        }
                    </div>
                </div>
                <div class="hamburger-section mt-4">
                    <span class="hamburger-label">Date Format</span>
                    <select class="hamburger-date-select"
                            [value]="dateFormatService.state().dateFormat"
                            (change)="selectDateFormat($any($event.target).value)">
                        <option value="DD/MM/YY">DD/MM/YY</option>
                        <option value="YY/MM/DD">YY/MM/DD</option>
                        <option value="MM/DD/YY">MM/DD/YY</option>
                    </select>
                </div>
            </div>

        </div>
    </div>
}
