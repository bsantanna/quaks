<div class="bg-slate-800 pb-32">

    @if (path() !== '') {
        <nav class="fixed top-0 w-full bg-slate-800 z-50">
            <div class="mx-auto px-2 sm:px-4 lg:px-8">
                <div class="relative flex h-16 items-center justify-between">

                    <div class="flex items-center px-2 lg:px-0">
                        <div class="shrink-0">
                            <a href="/">
                                <img src="/logo.svg" alt="Quaks Logo" class="block size-12"/>
                            </a>
                        </div>
                        <div class="hidden lg:flex items-center gap-4 ml-4 transition-opacity duration-200">
                            @if (stickyVisible()) {
                                <span class="text-sm font-bold text-white truncate max-w-48">{{ title() }}</span>
                            }
                        </div>
                    </div>

                    <div class="absolute left-1/2 -translate-x-1/2 hidden lg:flex items-center gap-2">
                        <app-nav-button
                                [buttonLabel]="'Stocks'"
                                [buttonIcon]="'/svg/icon-bar-chart.svg'"
                                [navigationPath]="'/markets/stocks'"
                        ></app-nav-button>
                        <app-nav-button
                                [buttonLabel]="'Performance'"
                                [buttonIcon]="'/svg/icon-chart-compare.svg'"
                                [navigationPath]="'/markets/performance'"
                        ></app-nav-button>
                        <app-nav-button
                                [buttonLabel]="'News'"
                                [buttonIcon]="'/svg/icon-document.svg'"
                                [navigationPath]="'/markets/news'"
                        ></app-nav-button>
                        <app-share-button></app-share-button>
                    </div>

                    <div class="flex items-center px-2 lg:px-0">
                        @if (stickyVisible()) {
                            @if (path().indexOf('stocks') > -1) {
                                <app-stock-autocomplete
                                        [inputPlaceholder]="'Search stock symbols'"
                                        (stockSelected)="onKeyTickerSelected($event)">
                                </app-stock-autocomplete>
                            }
                            @if (path().indexOf('news') > -1) {
                                <app-news-autocomplete
                                        [inputPlaceholder]="'Search news'">
                                </app-news-autocomplete>
                            }
                        } @else {
                            <div class="sm:hidden">
                                <span class="text-sm font-bold text-white truncate max-w-48">{{ title() }}</span>
                            </div>
                        }

                    </div>

                </div>
            </div>
        </nav>

        <div class="fixed top-2 left-1/2 -translate-x-1/2 z-[60]">
            <app-feedback-message></app-feedback-message>
        </div>
    }

    <div #subHeader class="mt-16 py-4">
        <div class="mx-auto px-4 sm:px-6 lg:px-8">
            <div class="md:flex md:items-center md:justify-between">
                <div class="min-w-0 flex-1 hidden sm:block">
                    <span class="text-2xl/7 font-bold text-white sm:truncate sm:text-3xl sm:tracking-tight">{{ title() }}</span>
                </div>

                <div class="w-full max-w-lg lg:max-w-xs">
                    <!-- Show on stocks page -->
                    @if (path().indexOf('stocks') >-1) {
                        <app-stock-autocomplete
                                [inputPlaceholder]="'Search stocks (e.g., NVDA, GOOG)'"
                                (stockSelected)="onKeyTickerSelected($event)">
                        </app-stock-autocomplete>
                    }
                    <!-- Show on news page -->
                    @if (path().indexOf('news') > -1) {
                        <app-news-autocomplete
                                [inputPlaceholder]="'Search news (e.g., Tesla, earnings)'">
                        </app-news-autocomplete>
                    }
                </div>

            </div>
        </div>
    </div>


</div>
