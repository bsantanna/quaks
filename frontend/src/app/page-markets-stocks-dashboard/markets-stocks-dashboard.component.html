<div class="mx-auto grid max-w-2xl grid-cols-1 items-start gap-x-8 gap-y-8 lg:mx-0 lg:max-w-none lg:grid-cols-3">

    <!-- Mobile only: stock info header (sticky) + eod actions on top -->
    <div class="lg:hidden sticky top-9 z-10 mx-1 sm:mx-0">
        <div class="dashboard-panel-blur">
            <app-stock-info-header
                    [indexName]="'quaks_stocks-eod_latest'"
                    [keyTicker]="keyTicker()"
                    [companyName]="companyName()"
                    [(intervalInDays)]="intervalInDays"
                    [intervalInDates]="intervalInDates()"
                    [useIntervalInDates]="useIntervalInDates()"
            ></app-stock-info-header>
        </div>
    </div>

    <div class="lg:hidden">
        <app-stock-eod-actions
                [keyTicker]="keyTicker()">
        </app-stock-eod-actions>
    </div>

    <!-- Desktop: charts spanning cols 1-2 -->
    <div class="lg:col-span-2 lg:row-start-1">
        @if (isProduction) {
            <app-stock-eod-charts
                    [keyTicker]="keyTicker()"
                    [intervalInDays]="intervalInDays()"
                    [intervalInDates]="intervalInDates()"
                    [useIntervalInDates]="useIntervalInDates()">
            </app-stock-eod-charts>
        } @else {
            <p class="text-white">
                Charts are not available on development environment.
                Cross domain issues prevent the charts from loading.
            </p>
        }
    </div>

    <!-- Desktop only: sticky sidebar in col 3 -->
    <div class="hidden lg:block lg:col-start-3 lg:row-start-1 sticky mt-8 top-20">
        <div class="flex flex-col gap-y-8">
            <div class="dashboard-panel">
                <h2 class="sr-only">Summary</h2>
                <app-stock-info-header
                        [indexName]="'quaks_stocks-eod_latest'"
                        [keyTicker]="keyTicker()"
                        [companyName]="companyName()"
                        [(intervalInDays)]="intervalInDays"
                        [intervalInDates]="intervalInDates()"
                        [useIntervalInDates]="useIntervalInDates()"
                ></app-stock-info-header>
            </div>

            <div>
                <app-stock-eod-actions
                        [keyTicker]="keyTicker()">
                </app-stock-eod-actions>
            </div>
        </div>
    </div>

</div>
