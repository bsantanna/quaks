<div class="news-list-container flex flex-col">
    @for (item of newsItems(); track item.id) {
        <a [href]="`/markets/news/item/${indexName()}/${item.id}`" target="_blank"
           class="news-list-item flex flex-col md:flex-row gap-4 py-4 px-3 transition-colors group">
            <img [src]="item.images[1]?.url || item.images[0]?.url"
                 alt="{{item.headline}}"
                 class="news-list-image w-full md:w-24 h-40 md:h-24 object-cover flex-shrink-0">
            <div class="flex flex-col justify-center min-w-0 flex-1">
                <h4 class="text-base font-semibold news-title group-hover:text-white transition-colors mb-1 truncate">{{item.headline}}</h4>
                <p class="news-summary text-sm mb-2 line-clamp-2">{{item.summary}}</p>
                <div class="flex items-center text-xs news-meta">
                    <span class="font-medium capitalize">{{item.source}}</span>
                    <span class="mx-2">·</span>
                    <span>{{item.date | date: 'mediumDate'}}</span>
                    @if (item.key_ticker?.length) {
                        <span class="ml-auto news-ticker-badge px-2 py-1 text-xs font-semibold">{{item.key_ticker}}</span>
                    }
                </div>
            </div>
        </a>
    }
</div>
