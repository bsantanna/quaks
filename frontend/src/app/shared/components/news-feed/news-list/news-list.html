<div class="flex flex-col divide-y divide-gray-700/50">
    @for (item of newsItems(); track item.id) {
        <a [href]="`#/markets/news/item/${indexName()}/${item.id}`" target="_blank"
           class="flex flex-col md:flex-row gap-4 py-4 px-3 hover:bg-gray-700/30 rounded-lg transition-colors group">
            <img [src]="item.images[1]?.url || item.images[0]?.url"
                 alt="{{item.headline}}"
                 class="w-full md:w-24 h-40 md:h-24 object-cover rounded-lg flex-shrink-0">
            <div class="flex flex-col justify-center min-w-0 flex-1">
                <h4 class="text-base font-semibold text-gray-300 group-hover:text-gray-100 transition-colors mb-1 truncate">{{item.headline}}</h4>
                <p class="text-gray-400 text-sm mb-2 line-clamp-2">{{item.summary}}</p>
                <div class="flex items-center text-xs text-gray-500">
                    <span class="font-medium capitalize">{{item.source}}</span>
                    <span class="mx-2">·</span>
                    <span>{{item.date | date: 'mediumDate'}}</span>
                    @if (item.key_ticker?.length) {
                        <span class="ml-auto bg-blue-100 text-blue-800 px-2 py-1 rounded-md text-xs font-semibold">{{item.key_ticker}}</span>
                    }
                </div>
            </div>
        </a>
    }
</div>
