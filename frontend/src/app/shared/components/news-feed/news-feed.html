<div class="container mx-auto px-4 py-8 max-w-7xl">

    <app-news-media-cards
            [indexName]="indexName()"
            [newsItems]="newsItems()">
    </app-news-media-cards>

    <!-- Placeholder for no items -->
    @if (!newsItems() || newsItems().length === 0) {
        <div class="text-center text-gray-500 py-8">
            No news items available.
        </div>
    }

    <!-- Load More button -->
    @if (hasMore() && newsItems().length > 0) {
        <div class="text-center py-6">
            <button
                    (click)="loadMore()"
                    [disabled]="loading()"
                    class="inline-flex items-center px-6 py-2 border border-gray-600 rounded-md text-sm font-medium text-gray-300 bg-gray-800/50 hover:bg-gray-700/50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                @if (loading()) {
                    Loading...
                } @else {
                    Load More
                }
            </button>
        </div>
    }
</div>
