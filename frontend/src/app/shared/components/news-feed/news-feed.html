<div class="container mx-auto px-4 py-8 max-w-7xl">

    <app-news-media-cards
            [indexName]="indexName()"
            [newsItems]="newsItems()">
    </app-news-media-cards>

    @if (newsItems().length > 4) {
        <app-news-list
                [indexName]="indexName()"
                [newsItems]="newsItems().slice(4)">
        </app-news-list>
    }

    <!-- Placeholder for no items -->
    @if (!newsItems() || newsItems().length === 0) {
        <div class="text-center news-placeholder py-8">
            No news items available.
        </div>
    }

    <!-- Load More button -->
    @if (hasMore() && newsItems().length > 0) {
        <div class="text-center py-6">
            <button
                    (click)="loadMore()"
                    [disabled]="loading()"
                    class="news-load-more inline-flex items-center px-6 py-2 text-sm font-medium">
                @if (loading()) {
                    Loading...
                } @else {
                    Load More
                }
            </button>
        </div>
    }
</div>
