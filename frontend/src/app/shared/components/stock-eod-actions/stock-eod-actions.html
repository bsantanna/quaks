@if (isHeatmapStock()) {
<div class="grid grid-cols-1 sm:hidden">
    <select aria-label="Select a tab"
            (change)="selectedTab.set($any($event.target).value)"
            class="actions-select col-start-1 row-start-1 w-full appearance-none py-2 pr-8 pl-3 text-base">
        <option [selected]="selectedTab() === 'tools'" value="tools">Tools</option>
        <option [selected]="selectedTab() === 'insights'" value="insights">Insights</option>
    </select>
    <img src="/svg/icon-chevron-down.svg" class="pointer-events-none col-start-1 row-start-1 mr-2 size-5 self-center justify-self-end" aria-hidden="true" alt="" />
</div>
<div class="hidden sm:block">
    <div class="actions-tab-bar">
        <nav aria-label="Tabs" class="-mb-px flex space-x-8">
            <button (click)="selectedTab.set('tools')"
                    class="actions-tab border-b-2 px-1 py-4 text-sm font-medium whitespace-nowrap cursor-pointer"
                    [class]="selectedTab() === 'tools' ? 'active' : ''">
                Tools
            </button>
            <button (click)="selectedTab.set('insights')"
                    class="actions-tab border-b-2 px-1 py-4 text-sm font-medium whitespace-nowrap cursor-pointer"
                    [class]="selectedTab() === 'insights' ? 'active' : ''">
                Insights
            </button>
        </nav>
    </div>
</div>
}

@if (selectedTab() == 'tools') {
    <app-stock-eod-tools
            [keyTicker]="keyTicker()">
    </app-stock-eod-tools>
} @else if (selectedTab() == 'insights' && isHeatmapStock()) {
    <app-stock-eod-insights
            [keyTicker]="keyTicker()">
    </app-stock-eod-insights>
}
