<div class="isolate inline-flex flex-shrink-0">
  @for (range of ranges; track range.days; let first = $first) {
    <button
      type="button"
      (click)="setInterval(range.days)"
      class="interval-btn relative inline-flex items-center px-3 py-1.5 text-sm font-semibold cursor-pointer"
      [class.interval-active]="intervalInDays() === range.days"
      [class.-ml-px]="!first">
      {{ range.label }}
    </button>
  }
</div>
