name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
    types: [ opened, synchronize, reopened ]

permissions:
  contents: read

jobs:
  build:
    name: Build and scan
    runs-on: ubuntu-24.04
    if: ${{ !contains(github.event.head_commit.message, 'Automatically generated by python-semantic-release') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Frontend tests
        run: npm test
        working-directory: frontend
      - name: Frontend build
        run: npm run build
        working-directory: frontend
      - name: Set up Python 3.12
        uses: actions/setup-python@v3
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          sudo apt update -yq && sudo apt install -yq ffmpeg
      - name: Lint
        run: make lint
      - name: Test
        run: |
          pytest --cov=app --cov-report=xml
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          LANGWATCH_API_KEY: ${{ secrets.LANGWATCH_API_KEY }}
          LANGWATCH_ENDPOINT: ${{ secrets.LANGWATCH_ENDPOINT }}
          BUILD_WORKFLOW: "True"
      - name: SonarQube
        uses: SonarSource/sonarqube-scan-action@v6.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
